name: Deploy Web App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger VPS deploy
        run: |
          curl -X POST http://147.93.95.204/deploy \
            -H "x-deploy-token: ${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Length: 0" \
            --max-time 10 || true
