name: Deploy Web App to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env.production

      - name: Build
        run: npm run build

      - name: Create archive and deploy via webhook
        run: |
          tar -czf /tmp/dist.tar.gz -C dist .
          B64=$(base64 -w 0 /tmp/dist.tar.gz)
          curl -X POST http://147.93.95.204:4000/deploy \
            -H "Content-Type: application/json" \
            -H "x-deploy-token: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"archive\": \"$B64\"}" \
            --max-time 60
